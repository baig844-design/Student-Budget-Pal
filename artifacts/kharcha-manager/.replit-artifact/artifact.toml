kind = "web"
previewPath = "/"
title = "Kharcha Manager"
version = "1.0.0"
id = "artifacts/kharcha-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20549

[services.development]
run = "pnpm --filter @workspace/kharcha-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kharcha-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/kharcha-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20549"
BASE_PATH = "/"
